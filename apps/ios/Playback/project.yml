name: Playback
options:
  bundleIdPrefix: inc.allmyfriends
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "13"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: VR6F23HLU3
targets:
  Playback:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - target: PlaybackShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: inc.allmyfriends.playback
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Entitlements/Playback.entitlements
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Generated-Info.plist
      properties:
        CFBundleDisplayName: Playback
        ITSAppUsesNonExemptEncryption: false
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UIStatusBarHidden: true
        UIBackgroundModes:
          - audio
        CFBundleURLTypes:
          - CFBundleURLName: inc.allmyfriends.playback
            CFBundleURLSchemes:
              - playback
        LSSupportsOpeningDocumentsInPlace: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: Playback Audio
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.audio
              - public.mp3
              - public.mpeg-4-audio
              - public.aiff-audio
              - com.microsoft.waveform-audio
        UIAppFonts:
          - UniversTE40-Light.ttf
          - UniversTE20-Light.ttf
          - UniversTE20-Thin.ttf
          - LetteraMonoLL-Regular.otf
          - Ndot-55.otf
  PlaybackShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: inc.allmyfriends.playback.share
        CODE_SIGN_ENTITLEMENTS: Entitlements/PlaybackShareExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Add to Playback
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule: 'SUBQUERY(extensionItems, $extensionItem, SUBQUERY($extensionItem.attachments, $attachment, ANY $attachment.registeredTypeIdentifiers UTI-CONFORMS-TO "public.audio").@count >= 1).@count >= 1'
  PlaybackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: Playback
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: inc.allmyfriends.playback.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Playback

schemes:
  Playback:
    build:
      targets:
        Playback: all
        PlaybackShareExtension: all
    test:
      targets:
        - name: PlaybackUITests
